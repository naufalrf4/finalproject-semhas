<section class="slide">
  <div class="pad">

    <div class="topbar reveal d1">
      <div class="kicker">Metode &middot; Ambang Batas Parameter</div>
      <div class="brand"><img src="assets/logo-svipb.png" alt="Sekolah Vokasi IPB" /></div>
    </div>

    <div class="reveal d2" style="flex:1;min-height:0;padding-bottom:17cqh;display:flex;flex-direction:column;gap:1.6cqh;margin-top:0;justify-content:center;">

      <!-- Parameter optimal-range bands -->
      <div class="reveal d2" style="display:flex;flex-direction:column;gap:1cqh;">
        <div style="font-family:var(--font-head);font-weight:700;color:var(--ink);font-size:1.5cqw;">Rentang optimum per parameter</div>

        <!-- pH -->
        <div style="display:flex;align-items:center;gap:1cqw;">
          <span style="font-family:var(--font-head);font-weight:700;color:var(--ink);font-size:1.4cqw;width:5cqw;flex:none;">pH</span>
          <svg viewBox="0 0 100 6" preserveAspectRatio="none" style="flex:1;height:2.4cqh;" role="img" aria-label="pH optimum 6,0 sampai 6,8 pada skala 0 sampai 14">
            <rect x="0" y="1.6" width="100" height="2.8" rx="1.4" fill="var(--surface-2)" />
            <rect x="42.86" y="1.6" width="5.71" height="2.8" rx="1" fill="#16A34A" />
          </svg>
          <span style="font-family:var(--font-head);font-weight:700;color:var(--primary);font-size:1.4cqw;width:11cqw;flex:none;text-align:right;">6,0 &ndash; 6,8</span>
        </div>

        <!-- Suhu -->
        <div style="display:flex;align-items:center;gap:1cqw;">
          <span style="font-family:var(--font-head);font-weight:700;color:var(--ink);font-size:1.4cqw;width:5cqw;flex:none;">Suhu</span>
          <svg viewBox="0 0 100 6" preserveAspectRatio="none" style="flex:1;height:2.4cqh;" role="img" aria-label="Suhu optimum 28 sampai 31 derajat pada skala 20 sampai 35">
            <rect x="0" y="1.6" width="100" height="2.8" rx="1.4" fill="var(--surface-2)" />
            <rect x="53.3" y="1.6" width="20" height="2.8" rx="1" fill="#16A34A" />
          </svg>
          <span style="font-family:var(--font-head);font-weight:700;color:var(--primary);font-size:1.4cqw;width:11cqw;flex:none;text-align:right;">28 &ndash; 31 &deg;C</span>
        </div>

        <!-- DO -->
        <div style="display:flex;align-items:center;gap:1cqw;">
          <span style="font-family:var(--font-head);font-weight:700;color:var(--ink);font-size:1.4cqw;width:5cqw;flex:none;">DO</span>
          <svg viewBox="0 0 100 6" preserveAspectRatio="none" style="flex:1;height:2.4cqh;" role="img" aria-label="DO minimum 5,0 mg per liter pada skala 0 sampai 10">
            <rect x="0" y="1.6" width="100" height="2.8" rx="1.4" fill="var(--surface-2)" />
            <rect x="50" y="1.6" width="50" height="2.8" rx="1" fill="#16A34A" />
          </svg>
          <span style="font-family:var(--font-head);font-weight:700;color:var(--primary);font-size:1.4cqw;width:11cqw;flex:none;text-align:right;">&ge; 5,0 mg/L</span>
        </div>

        <!-- TDS -->
        <div style="display:flex;align-items:center;gap:1cqw;">
          <span style="font-family:var(--font-head);font-weight:700;color:var(--ink);font-size:1.4cqw;width:5cqw;flex:none;">TDS</span>
          <svg viewBox="0 0 100 6" preserveAspectRatio="none" style="flex:1;height:2.4cqh;" role="img" aria-label="TDS optimum 10 sampai 150 ppm pada skala 0 sampai 300">
            <rect x="0" y="1.6" width="100" height="2.8" rx="1.4" fill="var(--surface-2)" />
            <rect x="3.33" y="1.6" width="46.67" height="2.8" rx="1" fill="#16A34A" />
          </svg>
          <span style="font-family:var(--font-head);font-weight:700;color:var(--primary);font-size:1.4cqw;width:11cqw;flex:none;text-align:right;">10 &ndash; 150 ppm</span>
        </div>
      </div>

      <!-- RI category bar (HTML, proporsi 30/30/40) -->
      <div class="reveal d5" style="display:flex;flex-direction:column;gap:.9cqh;">
        <div style="font-family:var(--font-head);font-weight:700;color:var(--ink);font-size:1.5cqw;">Kategori indeks risiko (RI)</div>
        <div style="display:flex;width:100%;height:4cqh;border-radius:.8cqw;overflow:hidden;">
          <div style="flex:30;background:#1aa564;display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--font-head);font-weight:700;font-size:1.4cqw;">Baik</div>
          <div style="flex:30;background:#e3b400;display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--font-head);font-weight:700;font-size:1.4cqw;">Waspada</div>
          <div style="flex:40;background:#d4322c;display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--font-head);font-weight:700;font-size:1.4cqw;">Berisiko</div>
        </div>
        <div style="position:relative;width:100%;height:1.6cqh;color:var(--muted);font-size:1.15cqw;">
          <span style="position:absolute;left:0;">0,00</span>
          <span style="position:absolute;left:30%;transform:translateX(-50%);">0,30</span>
          <span style="position:absolute;left:60%;transform:translateX(-50%);">0,60</span>
          <span style="position:absolute;right:0;">1,00</span>
        </div>
      </div>

    </div>

    <div class="foot-img reveal d6"><img src="assets/footer-1.png" alt="" /></div>
  </div>
</section>
