<section class="slide">
  <div class="pad">

    <div class="topbar reveal d1">
      <div class="kicker">Metode &middot; Ambang Batas Parameter</div>
      <div class="brand"><img src="assets/logo-svipb.png" alt="Sekolah Vokasi IPB" /></div>
    </div>

    <div class="reveal d2" style="flex:1;min-height:0;padding-bottom:17cqh;display:flex;flex-direction:column;gap:1.4cqh;margin-top:0;">

      <!-- Four parameter threshold tiles -->
      <div class="l-grid" style="--cols:4;margin-top:0;gap:1.4cqw;flex:none;">
        <div class="tile center reveal d2" style="padding:2cqh 1.2cqw;gap:.7cqh;">
          <div class="iconchip"><svg><use href="#i-spark"/></svg></div>
          <h3>pH</h3>
          <span style="font-family:var(--font-head);font-weight:700;color:var(--primary);font-size:2.6cqw;">6,0 &ndash; 6,8</span>
          <p>rentang optimum</p>
        </div>
        <div class="tile center reveal d3" style="padding:2cqh 1.2cqw;gap:.7cqh;">
          <div class="iconchip"><svg><use href="#i-spark"/></svg></div>
          <h3>Suhu</h3>
          <span style="font-family:var(--font-head);font-weight:700;color:var(--primary);font-size:2.6cqw;">28 &ndash; 31 &deg;C</span>
          <p>rentang optimum</p>
        </div>
        <div class="tile center reveal d4" style="padding:2cqh 1.2cqw;gap:.7cqh;">
          <div class="iconchip"><svg><use href="#i-spark"/></svg></div>
          <h3>DO</h3>
          <span style="font-family:var(--font-head);font-weight:700;color:var(--primary);font-size:2.6cqw;">&ge; 5,0 mg/L</span>
          <p>batas minimum</p>
        </div>
        <div class="tile center reveal d5" style="padding:2cqh 1.2cqw;gap:.7cqh;">
          <div class="iconchip"><svg><use href="#i-spark"/></svg></div>
          <h3>TDS</h3>
          <span style="font-family:var(--font-head);font-weight:700;color:var(--primary);font-size:2.6cqw;">10 &ndash; 150 ppm</span>
          <p>rentang optimum</p>
        </div>
      </div>

      <!-- Risk-index category legend -->
      <div class="reveal d6" style="display:flex;flex-direction:column;gap:.8cqh;flex:1;min-height:0;justify-content:center;">
        <div style="font-family:var(--font-head);font-weight:600;color:var(--ink);font-size:1.5cqw;">Kategori indeks risiko (RI)</div>
        <div style="display:flex;gap:1.4cqw;">
          <div style="flex:1;display:flex;align-items:center;gap:.8cqw;padding:1.4cqh 1.2cqw;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);">
            <span style="width:1.4cqw;height:1.4cqw;border-radius:50%;background:#1aa564;flex:none;"></span>
            <div><div style="font-family:var(--font-head);font-weight:700;color:var(--ink);font-size:1.5cqw;">Baik</div><div style="color:var(--muted);font-size:1.2cqw;">RI 0,00 &ndash; 0,30</div></div>
          </div>
          <div style="flex:1;display:flex;align-items:center;gap:.8cqw;padding:1.4cqh 1.2cqw;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);">
            <span style="width:1.4cqw;height:1.4cqw;border-radius:50%;background:#e3b400;flex:none;"></span>
            <div><div style="font-family:var(--font-head);font-weight:700;color:var(--ink);font-size:1.5cqw;">Waspada</div><div style="color:var(--muted);font-size:1.2cqw;">RI 0,31 &ndash; 0,60</div></div>
          </div>
          <div style="flex:1;display:flex;align-items:center;gap:.8cqw;padding:1.4cqh 1.2cqw;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);">
            <span style="width:1.4cqw;height:1.4cqw;border-radius:50%;background:#d4322c;flex:none;"></span>
            <div><div style="font-family:var(--font-head);font-weight:700;color:var(--ink);font-size:1.5cqw;">Berisiko</div><div style="color:var(--muted);font-size:1.2cqw;">RI 0,61 &ndash; 1,00</div></div>
          </div>
        </div>
      </div>

    </div>

    <div class="foot-img reveal d6"><img src="assets/footer-1.png" alt="" /></div>
  </div>
</section>
