<section class="slide">
  <div class="pad">

    <div class="topbar reveal d1">
      <div class="kicker">Hasil &middot; Kanal Notifikasi</div>
      <div class="brand"><img src="assets/logo-svipb.png" alt="Sekolah Vokasi IPB" /></div>
    </div>

    <div class="col reveal d2" style="flex:1;min-height:0;padding-bottom:17cqh;gap:1.4cqh;justify-content:center;">

      <!-- THREE CHANNELS -->
      <div class="l-grid reveal d2" style="--cols:3;align-items:stretch;gap:1.6cqw;margin-top:0;">

        <!-- WhatsApp -->
        <div class="tile reveal d3" style="background:var(--surface-2);align-items:center;text-align:center;gap:.8cqh;">
          <div class="iconchip" style="background:#25D366;">
            <svg viewBox="0 0 32 32" style="width:2.4cqw;height:2.4cqw;" aria-label="WhatsApp"><path fill="#fff" d="M16 3C9.4 3 4 8.4 4 15c0 2.1.6 4.2 1.6 6L4 27l6.2-1.6c1.7.9 3.7 1.4 5.8 1.4 6.6 0 12-5.4 12-12S22.6 3 16 3zm0 21.8c-1.8 0-3.6-.5-5.1-1.4l-.4-.2-3.7 1 1-3.6-.2-.4c-1-1.6-1.5-3.4-1.5-5.2C6 9.5 10.5 5 16 5s10 4.5 10 10-4.5 9.8-10 9.8zm5.5-7.4c-.3-.2-1.8-.9-2-1-.3-.1-.5-.2-.7.2-.2.3-.8 1-.9 1.1-.2.2-.3.2-.6.1-1.8-.9-3-1.6-4.2-3.6-.3-.5.3-.5.9-1.6.1-.2 0-.4 0-.6s-.7-1.7-1-2.3c-.3-.6-.5-.5-.7-.5h-.6c-.2 0-.5.1-.8.4-.3.3-1 1-1 2.5s1.1 2.9 1.2 3.1c.2.2 2.2 3.4 5.3 4.7 2 .8 2.7.9 3.7.8.6-.1 1.8-.8 2.1-1.5.3-.7.3-1.4.2-1.5-.1-.2-.3-.2-.6-.4z"/></svg>
          </div>
          <h3>WhatsApp</h3>
          <img src="assets/notif-whatsapp.jpg" alt="Notifikasi WhatsApp" style="max-width:100%;max-height:40cqh;object-fit:contain;border-radius:var(--radius);box-shadow:var(--shadow-sm);" />
        </div>

        <!-- Telegram -->
        <div class="tile reveal d4" style="background:var(--surface-2);align-items:center;text-align:center;gap:.8cqh;">
          <div class="iconchip" style="background:#229ED9;">
            <svg viewBox="0 0 32 32" style="width:2.4cqw;height:2.4cqw;" aria-label="Telegram"><path fill="#fff" d="M25.5 6.3 4.9 14.2c-1.4.6-1.4 1.4-.3 1.7l5.3 1.6 2 6.2c.3.7.5 1 1 1 .5 0 .7-.2 1-.5l2.5-2.4 5.2 3.8c1 .5 1.6.3 1.9-.9l3.4-16c.3-1.4-.5-2-1.9-1.4zM11.5 17.4l11.4-7.2c.5-.3 1-.1.6.2l-9.2 8.3-.4 3.8-2.4-5.1z"/></svg>
          </div>
          <h3>Telegram</h3>
          <img src="assets/notif-telegram.jpg" alt="Notifikasi Telegram" style="max-width:100%;max-height:40cqh;object-fit:contain;border-radius:var(--radius);box-shadow:var(--shadow-sm);" />
        </div>

        <!-- PWA push -->
        <div class="tile reveal d5" style="background:var(--surface-2);align-items:center;text-align:center;gap:.8cqh;">
          <div class="iconchip" style="background:#5A0FC8;">
            <svg viewBox="0 0 32 32" style="width:2.4cqw;height:2.4cqw;" aria-label="PWA"><path fill="#fff" d="M4 9h24l-2.2 14H6.2L4 9zm3 2 1.4 9h15.2l1.4-9H7zm6 2.4h2l-.4 4.2h-1.2L13 13.4zm4.4 0h2.1l-1.6 4.2h-1.3l-1.1-2.6-1 2.6h-1.3l1.2-4.2h1.3l.9 2.4.8-2.4z"/></svg>
          </div>
          <h3>PWA push</h3>
          <img src="assets/notif-pwa.jpg" alt="Notifikasi push PWA" style="max-width:100%;max-height:40cqh;object-fit:contain;border-radius:var(--radius);box-shadow:var(--shadow-sm);" />
        </div>

      </div>

    </div>

    <div class="foot-img reveal d6"><img src="assets/footer-1.png" alt="" /></div>
  </div>
</section>
