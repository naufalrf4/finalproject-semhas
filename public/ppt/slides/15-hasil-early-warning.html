<section class="slide">
  <div class="pad">

    <div class="topbar reveal d1">
      <div class="kicker">Hasil &middot; Peringatan Dini</div>
      <div class="brand"><img src="assets/logo-svipb.png" alt="Sekolah Vokasi IPB" /></div>
    </div>

    <div class="reveal d2" style="flex:1;min-height:0;display:grid;grid-template-columns:1fr 2.4fr;gap:1.8cqw;padding-bottom:17cqh;align-items:center;">

      <!-- LEFT: 3 compact stat cards stacked -->
      <div style="display:flex;flex-direction:column;gap:.85cqh;">
        <div class="infocard reveal d3" style="flex-direction:column;align-items:flex-start;gap:.35cqh;padding:.9cqh 1cqw;">
          <div style="display:flex;align-items:center;gap:.6cqw;">
            <div class="iconchip" style="--chip-size:2.4cqw;"><svg><use href="#i-chat"/></svg></div>
            <h3 style="font-weight:600;font-size:1.35cqw;">Ambang peringatan</h3>
          </div>
          <p style="font-size:1.1cqw;margin:0;">TDS &gt; 282,05 ppm dan DO &lt; 3,03 mg/L memicu peringatan dini.</p>
        </div>
        <div class="infocard reveal d3" style="flex-direction:column;align-items:flex-start;gap:.35cqh;padding:.9cqh 1cqw;">
          <div style="display:flex;align-items:center;gap:.6cqw;">
            <div class="iconchip" style="--chip-size:2.4cqw;"><svg><use href="#i-cal"/></svg></div>
            <h3 style="font-weight:600;font-size:1.35cqw;">11 hari aktif</h3>
          </div>
          <p style="font-size:1.1cqw;margin:0;">Peringatan muncul pada 11 hari (10,68%) sepanjang pengamatan.</p>
        </div>
        <div class="infocard reveal d3" style="flex-direction:column;align-items:flex-start;gap:.35cqh;padding:.9cqh 1cqw;">
          <div style="display:flex;align-items:center;gap:.6cqw;">
            <div class="iconchip" style="--chip-size:2.4cqw;"><svg><use href="#i-shield"/></svg></div>
            <h3 style="font-weight:600;font-size:1.35cqw;">Pelengkap RI</h3>
          </div>
          <p style="font-size:1.1cqw;margin:0;">Ambang per parameter melengkapi RI <span style="font-style:italic;">rolling</span> 24 jam.</p>
        </div>
      </div>

      <!-- RIGHT: figure -->
      <div class="reveal d4" style="display:flex;align-items:center;justify-content:center;height:100%;">
        <img src="assets/fig/21_early_warning.png" alt="Peringatan dini kualitas air" style="max-width:100%;max-height:48cqh;object-fit:contain;border-radius:var(--radius);box-shadow:var(--shadow-sm);" />
      </div>

    </div>

    <div class="foot-img reveal d6"><img src="assets/footer-1.png" alt="" /></div>
  </div>
</section>
