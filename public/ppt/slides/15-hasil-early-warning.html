<section class="slide">
  <div class="pad">

    <div class="topbar reveal d1">
      <div class="kicker">Hasil &middot; Peringatan Dini</div>
      <div class="brand"><img src="assets/logo-svipb.png" alt="Sekolah Vokasi IPB" /></div>
    </div>

    <div class="reveal d2" style="flex:1;min-height:0;display:flex;flex-direction:column;padding-bottom:17cqh;gap:1.2cqh;margin-top:0;">

      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:1.2cqw;align-items:stretch;">
        <div class="infocard reveal d3">
          <div class="iconchip"><svg><use href="#i-chat"/></svg></div>

          <div class="iconchip"><svg><use href="#i-cal"/></svg></div>

        <div class="infocard reveal d3">
          <div class="iconchip"><svg><use href="#i-shield"/></svg></div>
          <div><h3>Pelengkap RI</h3><p>Ambang per parameter melengkapi RI <span style="font-style:italic;">rolling</span> 24 jam.</p></div>
        </div>
      </div>

      <div class="reveal d4" style="flex:1;min-height:0;display:flex;align-items:center;justify-content:center;">
        <img src="assets/fig/21_early_warning.png" alt="Peringatan dini kualitas air" style="max-width:100%;max-height:42cqh;object-fit:contain;border-radius:var(--radius);box-shadow:var(--shadow-sm);" />
      </div>

    </div>

    <div class="foot-img reveal d6"><img src="assets/footer-1.png" alt="" /></div>
