<section class="slide">
  <div class="pad">

    <div class="topbar reveal d1">
      <div class="kicker">Metode &middot; Waktu &amp; Lokasi Penelitian</div>
      <div class="brand"><img src="assets/logo-svipb.png" alt="Sekolah Vokasi IPB" /></div>
    </div>

    <div style="flex:1;min-height:0;display:grid;grid-template-columns:1fr 1fr;gap:2.2cqw;align-items:center;padding-bottom:17cqh;" class="reveal d2">

      <!-- LEFT: Waktu penelitian -->
      <div style="display:flex;flex-direction:column;gap:1.1cqh;">
        <div style="display:flex;align-items:center;gap:.8cqw;">
          <div class="iconchip"><svg><use href="#i-cal"/></svg></div>
          <span style="font-family:var(--font-head);font-weight:700;color:var(--ink);font-size:1.85cqw;">Waktu Penelitian</span>
        </div>

        <!-- Timeline strip: 103-day data window inside the project span -->
        <div class="reveal d4" style="background:var(--surface-2);border-radius:var(--radius);padding:1.6cqh 1.2cqw;display:flex;flex-direction:column;gap:1cqh;">
          <div style="display:flex;align-items:baseline;gap:.6cqw;">
            <span style="font-family:var(--font-head);font-weight:700;color:var(--primary);font-size:2.8cqw;">103</span>
            <span style="color:var(--ink-soft);font-size:1.3cqw;font-weight:600;">hari pengambilan data kontinu</span>
          </div>
          <svg viewBox="0 0 100 16" style="width:100%;height:auto;font-family:Arial,Helvetica,sans-serif;" role="img" aria-label="Garis waktu 103 hari pengambilan data, 1 Desember 2025 sampai 13 Maret 2026">
            <line x1="3" y1="8" x2="97" y2="8" stroke="rgba(0,48,135,0.18)" stroke-width="0.8" stroke-linecap="round" />
            <rect x="3" y="6.2" width="94" height="3.6" rx="1.8" fill="#003087" opacity="0.85" />
            <circle cx="3" cy="8" r="2" fill="#003087" />
            <circle cx="97" cy="8" r="2" fill="#CC006E" />
            <text x="3" y="3.4" text-anchor="start" font-size="3" fill="#444466">1 Des 2025</text>
            <text x="97" y="3.4" text-anchor="end" font-size="3" fill="#444466">13 Mar 2026</text>
            <text x="3" y="14.4" text-anchor="start" font-size="2.7" fill="#8888A8">mulai</text>
            <text x="97" y="14.4" text-anchor="end" font-size="2.7" fill="#8888A8">selesai</text>
          </svg>
        </div>
      </div>

      <!-- RIGHT: Foto lokasi + info lokasi -->
      <div class="reveal d4" style="display:flex;flex-direction:column;gap:.9cqh;">
        <div style="display:flex;align-items:center;gap:.8cqw;">
          <div class="iconchip"><svg><use href="#i-pin"/></svg></div>
          <span style="font-family:var(--font-head);font-weight:700;color:var(--ink);font-size:1.85cqw;">Lokasi Penelitian</span>
        </div>
        <!-- Foto lokasi: ganti src dengan foto Lab IKN asli bila sudah tersedia -->
        <div class="reveal d5" style="width:100%;aspect-ratio:16/7;border-radius:var(--radius);overflow:hidden;background:var(--surface-2);display:flex;align-items:center;justify-content:center;position:relative;">
          <img src="assets/lokasi-lab-ikn.jpg" alt="Lab IKN SV IPB" style="width:100%;height:100%;object-fit:cover;" />
          <div style="position:absolute;bottom:0;left:0;right:0;background:rgba(0,10,60,0.6);padding:.45cqh 1cqw;">
            <span style="color:#fff;font-size:1.1cqw;font-weight:600;">Lab IKN SV IPB</span>
          </div>
        </div>
      </div>

    </div>

    <div class="foot-img reveal d6"><img src="assets/footer-1.png" alt="" /></div>
  </div>
</section>
