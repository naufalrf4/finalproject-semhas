<section class="slide">
  <div class="pad">

    <div class="topbar reveal d1">
      <div class="kicker">Metode &middot; Kalibrasi DO</div>
      <div class="brand"><img src="assets/logo-svipb.png" alt="Sekolah Vokasi IPB" /></div>
    </div>

    <div class="l-split reveal d2" style="flex:1;min-height:0;padding-bottom:17cqh;align-items:center;gap:2.6cqw;margin-top:0;grid-template-columns:1.15fr 0.85fr;">

      <!-- LEFT: web calibration screenshot (large) -->
      <div style="display:flex;align-items:center;justify-content:center;height:100%;min-height:0;">
        <figure style="margin:0;display:flex;flex-direction:column;gap:.7cqh;align-items:center;">
          <img src="assets/kalibrasi-do-web.png" alt="Antarmuka kalibrasi DO sisi web" style="max-width:100%;max-height:60cqh;object-fit:contain;border-radius:var(--radius);box-shadow:var(--shadow-sm);" />
          <figcaption style="font-size:1.05cqw;color:var(--muted);text-align:center;">Antarmuka kalibrasi DO sisi <span style="font-style:italic;">web</span></figcaption>
        </figure>
      </div>

      <!-- RIGHT: sensor photo + solution photo + infocards -->
      <div class="col reveal d3" style="gap:1.1cqh;justify-content:center;">

        <div style="display:flex;gap:1.2cqw;align-items:stretch;">
          <figure style="margin:0;flex:1;display:flex;flex-direction:column;gap:.5cqh;align-items:center;">
            <img src="assets/sensor_do.jpg" alt="Sensor DO SEN0237" style="width:100%;max-height:17cqh;object-fit:cover;border-radius:var(--radius);box-shadow:var(--shadow-sm);" />
            <figcaption style="font-size:.95cqw;color:var(--muted);text-align:center;">Sensor DO SEN0237</figcaption>
          </figure>
          <figure style="margin:0;flex:1;display:flex;flex-direction:column;gap:.5cqh;align-items:center;">
            <img src="assets/kalibrasi-do-larutan.jpg" alt="Larutan acuan kalibrasi DO" style="width:100%;max-height:17cqh;object-fit:cover;border-radius:var(--radius);box-shadow:var(--shadow-sm);" />
            <figcaption style="font-size:.95cqw;color:var(--muted);text-align:center;">Natrium sulfit &amp; air teraerasi</figcaption>
          </figure>
        </div>

        <div class="infocard reveal d4">
          <div class="iconchip"><svg><use href="#i-target"/></svg></div>
          <div><h3>Kalibrasi dua titik</h3><p>Titik nol pada natrium sulfit jenuh dan titik jenuh 100% pada air teraerasi penuh.</p></div>
        </div>

        <div class="infocard reveal d5">
          <div class="iconchip"><svg><use href="#i-check"/></svg></div>
          <div><h3>Verifikasi</h3><p>Koefisien disimpan di NVS <span style="font-style:italic;">firmware</span>, lalu bacaan dicek mendekati 8,2&ndash;8,7 mg/L pada 20&deg;C.</p></div>
        </div>

      </div>

    </div>

    <div class="foot-img reveal d6"><img src="assets/footer-1.png" alt="" /></div>
  </div>
</section>
