services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-semhas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-semhas}
      POSTGRES_DB: ${POSTGRES_DB:-semhas}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-semhas}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-semhas}:${POSTGRES_PASSWORD:-semhas}@db:5432/${POSTGRES_DB:-semhas}
      PORT: 8080
      SEMHAS_ONLINE: ${SEMHAS_ONLINE:-false}
      ZOOM_LINK: ${ZOOM_LINK:-}
      LAPORAN_UNLOCKED: ${LAPORAN_UNLOCKED:-false}
    expose:
      - "8080"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    environment:
      SEMHAS_ONLINE: ${SEMHAS_ONLINE:-false}
      ZOOM_LINK: ${ZOOM_LINK:-}
      LAPORAN_UNLOCKED: ${LAPORAN_UNLOCKED:-false}
      UMAMI_SRC: ${UMAMI_SRC:-}
      UMAMI_WEBSITE_ID: ${UMAMI_WEBSITE_ID:-}
    ports:
      - "${WEB_PORT:-8080}:80"

  umami-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD:-umami}
      POSTGRES_DB: umami
    volumes:
      - umami_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami"]
      interval: 5s
      timeout: 5s
      retries: 10

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    restart: unless-stopped
    depends_on:
      umami-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://umami:${UMAMI_DB_PASSWORD:-umami}@umami-db:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET:-change-me-in-prod}
    ports:
      - "${UMAMI_PORT:-3001}:3000"

volumes:
  db_data:
  umami_db_data:
